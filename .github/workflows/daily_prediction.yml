name: 04 Daily Forecast

on:
  schedule:
    # 20:00 CEST = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Generate Strategy
        # Consistency check: use -m if it's in src/pipeline/predict_job.py
        # Or keep as is if run_forecast.py is in your root folder!
        run: python run_forecast.py

      - name: Archive Forecast Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: artifacts/
          retention-days: 3
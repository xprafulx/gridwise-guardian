name: 04 Daily Forecast

on:
  schedule:
    # 20:00 CEST = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

# --- CRITICAL NEW PERMISSION ---
# This allows the GitHub Actions bot to push code back to your repo
permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Code
        # fetch-depth: 0 is important so it checks out the full git history for pushing
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Generate Strategy & Export JSON
        env:
          # This forces the secret directly into Python's environment
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 
        run: python run_forecast.py

      # --- THE PRESTIGE STEP: COMMIT & PUSH ---
      - name: Push Static API to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest_forecast.json
          # The '|| echo' part prevents the action from failing if the data randomly happens to be exactly the same
          git commit -m "auto: sync daily forecast JSON for UI" || echo "No changes to commit"
          git push

      - name: Archive Forecast Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: artifacts/
          retention-days: 3

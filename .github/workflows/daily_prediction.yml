name: 04 Daily Forecast

on:
  schedule:
    # 20:00 Denmark time during summer/CEST
    # 19:00 Denmark time during winter/CET
    # GitHub cron uses UTC
    - cron: "0 18 * * *"

  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Sanity Check Secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL is empty."
            exit 1
          else
            echo "✅ DATABASE_URL is loaded."
          fi

          if [ -z "$ENTSOE_TOKEN" ]; then
            echo "❌ ENTSOE_TOKEN is empty."
            exit 1
          else
            echo "✅ ENTSOE_TOKEN is loaded."
          fi

      - name: Run Prediction and Recommendation
        run: python run_forecast.py

      - name: Archive Forecast Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: artifacts/
          retention-days: 3
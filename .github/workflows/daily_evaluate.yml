name: 02 Model Evaluation

on:
  schedule:
    # 02:00 CEST = 00:00 UTC
    # Runs right after Ingestion to score the model's performance.
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Evaluation Job
        # Calculates RMSE, MAE, and Drift (Evidently Score)
        run: python -m src.pipeline.evaluate_job

      - name: Archive Performance Metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-performance-metrics
          path: artifacts/
          retention-days: 14
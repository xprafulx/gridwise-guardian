name: 03 Smart Training

on:
  schedule:
    # Weekly refresh every Sunday
    # 03:30 Denmark time during summer/CEST
    # 02:30 Denmark time during winter/CET
    # GitHub cron uses UTC
    - cron: "30 1 * * 0"

  # Drift trigger: listens to the evaluation workflow
  workflow_run:
    workflows: ["02 Model Evaluation"]
    types:
      - completed

  # Manual override
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    # Run if:
    # 1. Weekly schedule
    # 2. Manual trigger
    # 3. Evaluation workflow failed because drift/low accuracy was detected
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Sanity Check Secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL is empty."
            exit 1
          else
            echo "✅ DATABASE_URL is loaded."
          fi

      - name: Run Training and Log to Neon Registry
        run: python -m src.pipeline.train_job

      - name: Archive Training Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-logs-${{ github.run_id }}
          path: artifacts/
          retention-days: 30
name: 03 Smart Training

on:
  schedule:
    # 03:00 CEST = 01:00 UTC
    # Fires every night to check if a retrain is needed!
    - cron: '0 1 * * *'  
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Evaluate & Potential Retrain
        # This script checks: Is it Sunday? OR Is Drift > 0.3?
        run: python -m src.pipeline.train_job

      - name: Archive Model Artifacts
        # Only uploads if the models folder actually changed/exists
        uses: actions/upload-artifact@v4
        with:
          name: trained-xgboost-model
          path: models/
          retention-days: 30
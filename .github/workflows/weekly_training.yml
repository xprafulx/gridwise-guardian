name: 03 Smart Training

on:
  schedule:
    # 🕒 Weekly Refresh: Every Sunday at 03:30 CEST (01:30 UTC)
    - cron: '30 1 * * 0'
  
  # 🚀 Drift Trigger: Listens to the Evaluation job
  workflow_run:
    workflows: ["02 Model Evaluation"]
    types:
      - completed
  
  # 🛠️ Manual Override
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    # 🛑 THE SMART TRIGGER LOGIC 🛑
    # Run if: It's Sunday OR you clicked run OR Evaluation found the "🚨 ALERT" and failed
    if: >
      github.event_name == 'schedule' || 
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Training & Log to Neon Registry
        run: python -m src.pipeline.train_job

      - name: Archive Local Model Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trained-xgboost-model
          path: models/
          retention-days: 30

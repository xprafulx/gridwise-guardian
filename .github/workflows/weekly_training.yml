name: 03 Smart Training

on:
  schedule:
    # 🕒 Weekly Refresh: Every Sunday at 03:30 CEST (01:30 UTC)
    - cron: '30 1 * * 0'
  
  # 🚀 Drift Trigger: This allows the Evaluation job to "call" this workflow
  workflow_run:
    workflows: ["02 Model Evaluation"]
    types:
      - completed
  
  # 🛠️ Manual Override
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    # This 'if' check ensures we only run if:
    # 1. It's a Sunday (Schedule)
    # 2. It was manually started
    # 3. OR the Evaluation job specifically signaled a drift (using a custom logic/flag)
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Training & Log to Neon Registry
        run: python -m src.pipeline.train_job

      - name: Archive Local Model Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trained-xgboost-model
          path: models/
          retention-days: 30

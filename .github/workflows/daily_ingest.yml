name: 01 Daily Ingestion

on:
  schedule:
    # 03:00 CEST (01:00 UTC) - Syncing yesterday's 'Truth' after the midnight barrier
    - cron: '0 1 * * *'
  workflow_dispatch: # Manual trigger for your exam or testing

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    # WE CALL THE DATABASE HERE
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Ingestion Job
        # Running as a module ensures internal 'src' imports are seductive and smooth
        run: python -m src.pipeline.ingest_job

      - name: Archive Run Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-logs-${{ github.run_id }}
          path: artifacts/
          retention-days: 3

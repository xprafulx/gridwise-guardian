name: 01 Daily Ingestion

on:
  schedule:
    # 03:00 Denmark time during summer/CEST
    # 02:00 Denmark time during winter/CET
    # GitHub cron uses UTC
    - cron: "0 1 * * *"

  workflow_dispatch: # Manual trigger for testing/exam

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Ingestion Job
        run: python -m src.pipeline.ingest_job

      - name: Archive Run Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-logs-${{ github.run_id }}
          path: artifacts/
          retention-days: 3
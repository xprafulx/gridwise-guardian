<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Docs & Incidents</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(circle at 50% -10%, #1A1F26 0%, #05070A 100%);
            color: #F1F5F9;
            font-family: 'Outfit', sans-serif;
            display: flex;
            overflow: hidden;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif !important;
            font-weight: 700 !important;
            letter-spacing: -0.05em !important;
            color: #FFFFFF !important;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            margin-top: 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        aside {
            width: 320px;
            min-width: 320px;
            background-color: #05070A !important;
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .sidebar-title {
            font-size: 24px;
            margin-bottom: 30px;
        }

        main {
            flex: 1; 
            width: 100%;
            padding: 40px 3%; 
            overflow-y: auto;
            box-sizing: border-box;
        }

        .select-label {
            font-size: 11px; 
            color: #475569; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
        }
        select {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #fff;
            width: 100%;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            appearance: none;
        }
        select option { background: #05070A; color: #fff; }

        .kpi-container {
            display: flex; gap: 20px; margin-bottom: 40px; margin-top: 20px; width: 100%;
        }

        .kpi-card {
            flex: 1;
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 30px 20px; border-radius: 16px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .kpi-card:hover {
            border-color: rgba(56, 189, 248, 0.4); background: rgba(255, 255, 255, 0.04); transform: scale(1.02);
        }

        .kpi-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 10px; }
        .kpi-value { font-size: 2.5rem; font-weight: 900; color: #F8FAFC; line-height: 1; font-family: 'Space Grotesk'; }
        .kpi-sub { font-size: 0.85rem; margin-top: 10px; font-weight: 700; letter-spacing: 0.05em; }

        table {
            width: 100%; border-collapse: collapse; font-family: 'Outfit', sans-serif;
            font-size: 14px; margin-top: 20px; background: rgba(0,0,0,0.2);
            border-radius: 10px; overflow: hidden;
        }

        th { 
            text-align: left; color: #475569; font-size: 12px; padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; letter-spacing: 1px;
        }

        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); color: #94A3B8; }

        .highlight-row { background-color: rgba(0, 209, 255, 0.1) !important; }
        .highlight-row td { font-weight: 900 !important; color: #00D1FF !important; border-bottom: 2px solid #38BDF8 !important; }

        .clock-container { display: flex; flex-direction: column; align-items: center; font-family: 'Space Grotesk'; margin-top: 20px; }

        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>

    <aside>
        <h2 class="sidebar-title">GRIDWISE</h2>
        
        <div class="select-label">Region</div>
        <select id="regionSelect" onchange="updateDashboard()">
            <option value="DK1">DK1 Strategy Area</option>
            <option value="DK2" selected>DK2 Strategy Area</option>
        </select>
        
        <div class="clock-container">
            <svg width="170" height="170" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="95" stroke="rgba(255,255,255,0.02)" stroke-width="1" fill="none" />
                <circle cx="100" cy="100" r="12" id="centerGlow" fill="#475569" style="filter:blur(10px); opacity:0.5;">
                    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" />
                </circle>
                <circle cx="100" cy="100" r="5" id="centerDot" fill="#475569" />
                <g id="marks"></g>
                <line id="h" x1="100" y1="100" x2="100" y2="65" stroke="#fff" stroke-width="5" stroke-linecap="round" />
                <line id="m" x1="100" y1="100" x2="100" y2="45" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" />
                <line id="s" x1="100" y1="100" x2="100" y2="35" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            
            <div style="margin-top:25px; text-align:center; width:100%;">
                <div id="tickerStatus" style="color:#475569; font-weight:700; font-size:10px; letter-spacing:4px; text-transform:uppercase; margin-bottom:8px;">SYNCING...</div>
                <div id="tickerMsg" style="color:#fff; font-weight:700; font-size:12px; letter-spacing:1px; animation: pulse 2s infinite;">
                    AWAITING MLOPS DATA
                </div>
            </div>
        </div>
    </aside>

    <main>
        <h1 id="dashboardTitle">Connecting to AI Engine...</h1>
        
        <div class="kpi-container">
            <div class="kpi-card">
                <div class="kpi-label">Optimal Point</div>
                <div class="kpi-value" id="kpiBestTime">--:--</div>
                <div class="kpi-sub" style="color:#10B981" id="kpiBestCo2">--g CO2</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Peak Stress</div>
                <div class="kpi-value" id="kpiWorstTime">--:--</div>
                <div class="kpi-sub" style="color:#EF4444" id="kpiWorstCo2">--g CO2</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Grid Mean</div>
                <div class="kpi-value" id="kpiMean">--g</div>
                <div class="kpi-sub" style="color:#38BDF8">Intensity Baseline</div>
            </div>
        </div>

        <h3>Forecast Overview</h3>
        <div id="chart" style="width:100%; height:380px; margin-bottom: 20px;"></div>

        <h3>Daily AI Forecast Breakdown</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Price (DKK)</th>
                    <th>Predicted CO2 (g)</th>
                    <th>System Recommendation</th>
                </tr>
            </thead>
            <tbody id="dataTableBody">
            </tbody>
        </table>
    </main>

    <script>
        let globalData = null;

        // --- 1. FETCH DATA (Robust Pathing) ---
        async function fetchRealData() {
            const paths = ['docs/latest_forecast.json', 'latest_forecast.json'];
            
            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        globalData = await response.json();
                        console.log(`✅ Data loaded from: ${path}`, globalData);
                        updateDashboard();
                        return;
                    }
                } catch (error) {
                    console.warn(`Attempted ${path} but failed.`);
                }
            }
            
            console.error("❌ Could not find JSON file at any path.");
            document.getElementById("dashboardTitle").innerText = "ERROR: MLOps Data Not Found";
        }

        // --- 2. UPDATE THE UI ---
        function updateDashboard() {
            if (!globalData || !globalData.forecast) return;

            const region = document.getElementById("regionSelect").value;
            const now = new Date();
            const currentHourStr = now.getHours().toString().padStart(2, '0') + ":00";
            
            document.getElementById("dashboardTitle").innerText = `${region} Strategy | Active AI Forecast`;

            const regionData = globalData.forecast.filter(d => d.region === region);
            if (regionData.length === 0) {
                console.warn(`No data found for region: ${region}`);
                return;
            }

            const colorMap = { 'BEST': '#10B981', 'CAUTION': '#F59E0B', 'AVOID': '#EF4444' };

            let xVals = [], co2Data = [], priceData = [], barColors = [], statuses = [];
            let bestVal = 9999, bestIdx = 0, worstVal = -9999, worstIdx = 0, sumCo2 = 0;

            regionData.forEach((row, i) => {
                xVals.push(row.time);
                co2Data.push(parseFloat(row.co2)); // Ensure it's treated as a number
                priceData.push(parseFloat(row.price)); // Ensure it's treated as a number
                sumCo2 += parseFloat(row.co2);

                if (row.co2 < bestVal) { bestVal = row.co2; bestIdx = i; }
                if (row.co2 > worstVal) { worstVal = row.co2; worstIdx = i; }

                const statusColor = colorMap[row.status] || '#475569';
                barColors.push(statusColor);
                statuses.push({ text: row.status, color: statusColor, type: row.status });
            });

            // Update KPI Cards
            document.getElementById("kpiBestTime").innerText = xVals[bestIdx];
            document.getElementById("kpiBestCo2").innerText = `${bestVal.toFixed(1)}g CO2`;
            document.getElementById("kpiWorstTime").innerText = xVals[worstIdx];
            document.getElementById("kpiWorstCo2").innerText = `${worstVal.toFixed(1)}g CO2`;
            document.getElementById("kpiMean").innerText = `${(sumCo2/regionData.length).toFixed(1)}g`;

            // Update Table
            const tbody = document.getElementById('dataTableBody');
            let tableHTML = '';
            let foundCurrent = false;

            regionData.forEach((row, i) => {
                const isCurrent = (row.time === currentHourStr);
                const rowClass = isCurrent ? 'class="highlight-row"' : '';
                const timeLabel = isCurrent ? `${row.time} (NOW)` : row.time;

                tableHTML += `
                    <tr ${rowClass}>
                        <td>${timeLabel}</td>
                        <td>${parseFloat(row.price).toFixed(3)}</td>
                        <td>${parseFloat(row.co2).toFixed(1)}</td>
                        <td style="font-weight: 700; color: ${statuses[i].color}">${statuses[i].text}</td>
                    </tr>
                `;

                if (isCurrent) {
                    foundCurrent = true;
                    updateSidebar(statuses[i]);
                }
            });
            tbody.innerHTML = tableHTML;

            if (!foundCurrent && statuses.length > 0) {
                const latestStatus = statuses[statuses.length - 1]; 
                updateSidebar(latestStatus);
                document.getElementById("tickerStatus").innerText = "SYNCED (STALE DATA)";
            }

            // --- PLOTLY CHART FIX ---
            const traceBars = { 
                x: xVals, 
                y: priceData, 
                type: 'bar', 
                marker: { color: barColors, opacity: 0.6 }, // Increased opacity slightly for visibility
                yaxis: 'y1',
                name: 'Price'
            };
            
            const traceLine = { 
                x: xVals, 
                y: co2Data, 
                type: 'scatter', 
                mode: 'lines+markers', // Added markers to see exactly where data points hit
                line: {color: '#38BDF8', width: 3, shape: 'spline'}, 
                marker: {size: 6, color: '#38BDF8'},
                yaxis: 'y2',
                name: 'CO2'
            };
            
            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)', 
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#F1F5F9', family: 'Outfit' }, 
                margin: { l: 50, r: 50, t: 30, b: 50 }, // Added padding so axes don't clip
                showlegend: false, 
                barmode: 'group', // Prevents weird stacking behavior
                xaxis: { 
                    type: 'category', // FORCE Plotly to treat "HH:00" strings as categories, keeping them in exact order
                    showgrid: false, 
                    zeroline: false,
                    tickangle: -45 // Angle text so times don't overlap
                },
                yaxis: { 
                    showgrid: false, 
                    zeroline: false, 
                    title: 'Price (DKK)',
                    rangemode: 'tozero' // Ensure bars start at the bottom
                },
                yaxis2: { 
                    showgrid: true, // Show gridlines for the CO2 line to make it easier to read
                    gridcolor: 'rgba(255,255,255,0.05)',
                    zeroline: false, 
                    overlaying: 'y', 
                    side: 'right', 
                    title: 'CO2 Intensity (g)',
                    rangemode: 'tozero'
                }
            };
            Plotly.newPlot('chart', [traceBars, traceLine], layout, {displayModeBar: false});
        }

        function updateSidebar(status) {
            document.getElementById("centerDot").setAttribute("fill", status.color);
            document.getElementById("centerGlow").setAttribute("fill", status.color);
            document.getElementById("tickerStatus").innerText = `${status.type} NOW`;
            document.getElementById("tickerStatus").style.color = status.color;
            document.getElementById("tickerMsg").innerText = `${status.type} WINDOW ACTIVE`;
        }

        // --- 3. CLOCK ANIMATION ---
        const g = document.getElementById('marks');
        for (let i=0; i<12; i++) {
            const a = (i*30)*(Math.PI/180);
            const x = 100+84*Math.sin(a); const y = 100-84*Math.cos(a);
            const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
            c.setAttribute("cx",x); c.setAttribute("cy",y); c.setAttribute("r","3.5");
            c.setAttribute("fill", "#475569"); 
            g.appendChild(c);
        }

        function tick() {
            const d = new Date();
            const hAngle = (d.getHours()%12)*30 + d.getMinutes()*0.5;
            const mAngle = d.getMinutes()*6;
            const sAngle = d.getSeconds()*6;
            document.getElementById('h').setAttribute('transform',`rotate(${hAngle},100,100)`);
            document.getElementById('m').setAttribute('transform',`rotate(${mAngle},100,100)`);
            document.getElementById('s').setAttribute('transform',`rotate(${sAngle},100,100)`);
        }
        setInterval(tick, 1000); tick();

        // Boot system
        fetchRealData();
    </script>
</body>
</html>
